name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      previous_version: ${{ steps.version.outputs.previous_version }}
      version_changed: ${{ steps.version.outputs.version_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release version
        id: version
        env:
          COMPARE_REF: ${{ github.event.before }}
        run: node scripts/release-version.mjs --compare-ref "$COMPARE_REF"

      - name: Show release decision
        run: |
          echo "current version: ${{ steps.version.outputs.current_version }}"
          echo "previous version: ${{ steps.version.outputs.previous_version }}"
          echo "version changed: ${{ steps.version.outputs.version_changed }}"

  publish_tauri:
    needs: prepare_release
    if: github.event_name == 'workflow_dispatch' || needs.prepare_release.outputs.version_changed == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: Carbo v__VERSION__
          releaseBody: Automated desktop release generated by GitHub Actions.
          releaseCommitish: ${{ github.sha }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
